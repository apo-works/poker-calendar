<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">

<title>ポーカー大会カレンダー 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#2C2C2A;font-size:14px;line-height:1.5}
  h1{font-size:1.15rem;font-weight:700;padding:16px 16px 4px}
  .subtitle{font-size:0.78rem;color:#888;padding:0 16px 12px}
  .filters{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 12px}
  .filter-btn{border:none;border-radius:999px;padding:5px 14px;font-size:0.78rem;cursor:pointer;background:#F0F0EE;color:#555;transition:background 0.15s,color 0.15s}
  .filter-btn.active{background:#2C2C2A;color:#fff}
  .legend{display:flex;gap:14px;padding:0 16px 10px;font-size:0.75rem;color:#888;align-items:center}
  .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
  .legend-dot.confirmed{background:#2C2C2A}
  .legend-dot.unconfirmed{background:#bbb}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:0.72rem;font-weight:600;color:#888;padding:6px 10px;border-bottom:1.5px solid #E8E8E6;text-align:left;position:sticky;top:0;background:#fff;z-index:10}
  tbody tr{border-bottom:1px solid #F2F2F0;transition:background 0.1s}
  tbody tr:hover{background:#FAFAF8}
  td{padding:10px 10px;vertical-align:top}
  .col-period{width:10%;white-space:nowrap;font-size:0.82rem;color:#555}
  .col-tour{width:10%}
  .col-name{width:32%}
  .col-fee{width:24%}
  .col-rate{width:14%}
  .badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:0.72rem;font-weight:600;white-space:nowrap}
  .tour-name{font-weight:600;font-size:0.88rem;margin-bottom:2px}
  .venue{font-size:0.78rem;color:#777;margin-top:2px}
  .note{font-size:0.72rem;color:#aaa;margin-top:3px}
  .fee-main{font-weight:600;font-size:0.88rem}
  .fee-prize{font-size:0.78rem;color:#555;margin-top:2px}
  .rate-bar-wrap{margin-top:4px;height:5px;background:#EEE;border-radius:3px;width:100%}
  .rate-bar{height:5px;border-radius:3px}
  .rate-label{font-size:0.78rem;color:#555;margin-bottom:2px}
  .unconfirmed{opacity:0.38}
  footer{padding:16px;font-size:0.72rem;color:#aaa;border-top:1px solid #F0F0EE;margin-top:8px;line-height:1.8}
  @media(max-width:640px){
    thead{display:none}
    tbody tr{display:block;padding:10px 14px;border-bottom:1.5px solid #F0F0EE}
    td{display:block;padding:2px 0;width:100%!important}
    .col-period{font-size:0.78rem}
    .col-rate .rate-bar-wrap{width:80px}

<body>

<p class="subtitle">主要ポーカーツアーの2026年スケジュール一覧</p>

<div class="filters" id="filters">
  <button class="filter-btn active" data-tour="all">すべて</button>
  <button class="filter-btn" data-tour="JOPT">JOPT</button>

  <button class="filter-btn" data-tour="SPADIE">SPADIE</button>
  <button class="filter-btn" data-tour="USOP">USOP</button>

  <button class="filter-btn" data-tour="XPT">XPT</button>

  <button class="filter-btn" data-tour="APT">APT</button>
  <button class="filter-btn" data-tour="PPS">PPS</button>

<div class="legend">
  <span><span class="legend-dot confirmed"></span>確定情報</span>
  <span><span class="legend-dot unconfirmed"></span>未確定（過去実績参考）</span>
</div>

<table id="calTable">
  <thead>
    <tr>
      <th class="col-period">期間</th>
      <th class="col-tour">ツアー</th>
      <th class="col-name">大会名・会場</th>
      <th class="col-fee">参加費・優勝賞金</th>
      <th class="col-rate">還元率</th>
    </tr>
  </thead>
  <tbody id="calBody"></tbody>

<footer>
  ※ グレー表示の行は日程・詳細が未確定の情報です。過去実績を参考に記載しています。<br>
  ※ JOPT・戦国・SPADIE・USOP・XPT・P1（国内）は日本法規制により現金賞金なし。海外大会パッケージ等が賞品となります。<br>
  ※ 参加費は $1 = 150円で換算（概算）。<br>
  ※ 還元率 = プライズプール総額 ÷ 参加費徴収総額。過去複数回の平均値。WSOPは7%（4.9%手数料＋2.1%ディーラー費）を公式に開示。

data.sort((a,b) => a.sortKey - b.sortKey);

function rateCell(tour) {
  const r = RATE[tour];
  if (!r) return `<div class="rate-label">—</div>`;
  const bar = BAR_COLOR[tour] || "#aaa";
  return `<div class="rate-label">${r}%</div>
    <div class="rate-bar-wrap"><div class="rate-bar" style="width:${r}%;background:${bar}"></div></div>`;
}

function render(filter) {
  const body = document.getElementById("calBody");
  const rows = filter === "all" ? data : data.filter(d => d.tour === filter);
  body.innerHTML = rows.map(d => {
    const b = BADGE[d.tour] || {bg:"#EEE",color:"#333"};
    const cls = d.confirmed ? "" : " unconfirmed";
    return `<tr class="row${cls}" data-tour="${d.tour}">
      <td class="col-period">${d.period}</td>
      <td class="col-tour"><span class="badge" style="background:${b.bg};color:${b.color}">${d.tour}</span></td>
      <td class="col-name">
        <div class="tour-name">${d.name}</div>
        <div class="venue">📍 ${d.venue}</div>
        ${d.note ? `<div class="note">※ ${d.note}</div>` : ""}
      </td>
      <td class="col-fee">
        <div class="fee-main">${d.fee}</div>
        <div class="fee-prize">🏆 ${d.prize}</div>
      </td>
      <td class="col-rate">${rateCell(d.tour)}</td>
    </tr>`;
  }).join("");
}

render("all");

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render(btn.dataset.tour);
});
</script>
</body>
</html>
